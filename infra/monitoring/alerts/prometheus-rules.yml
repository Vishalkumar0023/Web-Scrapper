groups:
  - name: webscrapper-api-alerts
    interval: 1m
    rules:
      - alert: WebScrapperApi5xxRateHigh
        expr: |
          sum(rate(api_requests_total{status_code=~"5.."}[5m]))
          /
          clamp_min(sum(rate(api_requests_total[5m])), 1)
          > 0.05
        for: 10m
        labels:
          severity: warning
          service: webscrapper-api
        annotations:
          summary: "API 5xx error rate is high"
          description: "More than 5% of requests are failing with 5xx over 10 minutes."

      - alert: WebScrapperApiRateLimitBlocksHigh
        expr: sum(increase(api_rate_limit_blocked_total[10m])) > 100
        for: 10m
        labels:
          severity: warning
          service: webscrapper-api
        annotations:
          summary: "Rate limit blocks are high"
          description: "Large number of requests are being blocked by rate limiting."

      - alert: WebScrapperApiAuthFailuresHigh
        expr: sum(increase(api_auth_failed_total[10m])) > 50
        for: 10m
        labels:
          severity: warning
          service: webscrapper-api
        annotations:
          summary: "Authentication failures increased"
          description: "Auth failures exceeded threshold; investigate invalid token traffic."

      - alert: WebScrapperApiLatencyP95High
        expr: |
          (
            sum(rate(api_request_duration_ms_sum[5m]))
            /
            clamp_min(sum(rate(api_request_duration_ms_count[5m])), 1)
          ) > 1500
        for: 15m
        labels:
          severity: critical
          service: webscrapper-api
        annotations:
          summary: "API average latency is elevated"
          description: "Average API request duration exceeded 1500ms for 15 minutes."
