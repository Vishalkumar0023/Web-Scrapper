name: Deploy Staging

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Deploy Secret
        run: |
          if [ -z "${{ secrets.STAGING_DEPLOY_CMD }}" ]; then
            echo "Missing STAGING_DEPLOY_CMD secret."
            echo "Set this secret to the command that deploys the API and web apps to staging."
            exit 1
          fi

      - name: Execute Deploy Command
        run: ${{ secrets.STAGING_DEPLOY_CMD }}
